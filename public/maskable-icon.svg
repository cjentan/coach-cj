<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Maskable icon: content centered in the safe zone (inner 80%) -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Stylized running figure, scaled down and centered for maskable safe zone -->
  <g transform="translate(256, 300) scale(0.75)">
    <!-- Head -->
    <circle cx="0" cy="-110" r="36" fill="white" opacity="0.95"/>
    <!-- Body/torso -->
    <path d="M-8,-72 L8,-72 C12,-72 14,-68 12,-64 L2,-20 L-2,-20 L-12,-64 C-14,-68 -12,-72 -8,-72Z" fill="white" opacity="0.95"/>
    <!-- Left arm (back) -->
    <path d="M-8,-60 L-52,-40 C-56,-38 -58,-42 -54,-46 L-10,-64" fill="white" opacity="0.9"/>
    <!-- Right arm (forward) -->
    <path d="M8,-55 L56,-70 C60,-72 62,-68 58,-65 L12,-50" fill="white" opacity="0.95"/>
    <!-- Left leg (back/raised - running) -->
    <path d="M0,-18 L-44,20 C-48,24 -46,28 -40,26 L4,-14" fill="white" opacity="0.9"/>
    <!-- Right leg (forward/stride) -->
    <path d="M0,-18 L48,60 C50,64 46,66 42,62 L-4,-14" fill="white" opacity="0.95"/>
    <!-- Speed/dynamic lines -->
    <g stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6">
      <line x1="-70" y1="-30" x2="-50" y2="-30"/>
      <line x1="-65" y1="-50" x2="-45" y2="-50"/>
      <line x1="-60" y1="-70" x2="-40" y2="-70"/>
    </g>
  </g>
</svg>
